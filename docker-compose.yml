services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: drfapi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  web:
    image: rom2555/drf-api-server:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    command: sh -c "python manage.py migrate && gunicorn --bind 0.0.0.0:8000 DRF_API_SERVER.wsgi:application"
    restart: unless-stopped

volumes:
  postgres_data:
